<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>NAI 메타데이터 제거기</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/dist/tabler-icons.min.css">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #ffffff;
      --bg-secondary: #f5f5f3;
      --bg-info: #e6f1fb;
      --bg-success: #eaf3de;
      --bg-warning: #faeeda;
      --text-primary: #1a1a1a;
      --text-secondary: #6b6b67;
      --text-info: #185fa5;
      --text-success: #3b6d11;
      --border: rgba(0,0,0,0.12);
      --border-hover: rgba(0,0,0,0.25);
      --border-info: rgba(24,95,165,0.4);
      --radius-md: 8px;
      --radius-lg: 12px;
    }

    @media (prefers-color-scheme: dark) {
      :root {
        --bg: #1c1c1a;
        --bg-secondary: #252523;
        --bg-info: #042c53;
        --bg-success: #173404;
        --bg-warning: #412402;
        --text-primary: #f0ede8;
        --text-secondary: #9a9891;
        --text-info: #85b7eb;
        --text-success: #97c459;
        --border: rgba(255,255,255,0.12);
        --border-hover: rgba(255,255,255,0.25);
        --border-info: rgba(133,183,235,0.4);
      }
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: var(--bg-secondary);
      color: var(--text-primary);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 2rem 1rem;
    }

    .container {
      width: 100%;
      max-width: 720px;
    }

    header {
      text-align: center;
      margin-bottom: 2rem;
    }

    header h1 {
      font-size: 22px;
      font-weight: 500;
      color: var(--text-primary);
      margin-bottom: 6px;
    }

    header p {
      font-size: 14px;
      color: var(--text-secondary);
      line-height: 1.6;
    }

    /* ── 전역 포맷 설정 ── */
    .global-settings {
      background: var(--bg);
      border: 0.5px solid var(--border);
      border-radius: var(--radius-lg);
      padding: 14px 18px;
      margin-bottom: 14px;
      display: flex;
      align-items: center;
      gap: 14px;
      flex-wrap: wrap;
    }

    .global-settings label {
      font-size: 13px;
      color: var(--text-secondary);
      white-space: nowrap;
    }

    .format-tabs {
      display: flex;
      gap: 6px;
      flex-wrap: wrap;
    }

    .fmt-btn {
      padding: 5px 14px;
      border-radius: 999px;
      border: 1px solid var(--border-hover);
      background: transparent;
      color: var(--text-primary);
      font-size: 13px;
      cursor: pointer;
      transition: background 0.12s, color 0.12s, border-color 0.12s;
    }

    .fmt-btn.active {
      background: var(--text-primary);
      color: var(--bg);
      border-color: var(--text-primary);
    }

    /* ── 드롭존 ── */
    .drop-zone {
      border: 1.5px dashed var(--border-hover);
      border-radius: var(--radius-lg);
      padding: 2.5rem 1.5rem;
      text-align: center;
      cursor: pointer;
      transition: background 0.15s, border-color 0.15s;
      background: var(--bg);
    }

    .drop-zone:hover, .drop-zone.dragover {
      background: var(--bg-info);
      border-color: var(--border-info);
    }

    .drop-zone i { font-size: 36px; color: var(--text-secondary); }
    .drop-zone p { margin-top: 10px; font-weight: 500; font-size: 15px; }
    .drop-zone small { font-size: 13px; color: var(--text-secondary); }

    /* ── 통계 ── */
    .stat-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      margin-top: 16px;
    }

    .stat-card {
      background: var(--bg);
      border: 0.5px solid var(--border);
      border-radius: var(--radius-md);
      padding: 10px 18px;
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .stat-label { font-size: 13px; color: var(--text-secondary); }
    .stat-val { font-size: 20px; font-weight: 500; }

    .reset-btn {
      display: flex;
      align-items: center;
      gap: 5px;
      padding: 8px 14px;
      border-radius: var(--radius-md);
      border: 0.5px solid var(--border-hover);
      background: transparent;
      color: var(--text-secondary);
      font-size: 13px;
      cursor: pointer;
      transition: background 0.12s, color 0.12s;
      white-space: nowrap;
    }

    .reset-btn:hover {
      background: var(--bg-warning);
      color: var(--text-primary);
      border-color: rgba(180,100,0,0.3);
    }

    /* ── 파일 목록 ── */
    .file-list { margin-top: 12px; }

    .file-item {
      background: var(--bg);
      border: 0.5px solid var(--border);
      border-radius: var(--radius-md);
      margin-bottom: 10px;
      overflow: hidden;
    }

    .file-item-main {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 10px 14px;
    }

    .file-thumb {
      width: 44px;
      height: 44px;
      object-fit: cover;
      border-radius: 4px;
      border: 0.5px solid var(--border);
      flex-shrink: 0;
    }

    .file-info { flex: 1; min-width: 0; }

    .file-name-row {
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .file-name {
      font-size: 13px;
      font-weight: 500;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .file-meta { font-size: 12px; color: var(--text-secondary); margin-top: 2px; }

    /* ── 파일명 편집 영역 ── */
    .filename-edit {
      border-top: 0.5px solid var(--border);
      padding: 8px 14px 10px;
      display: none;
    }

    .filename-edit.open { display: block; }

    .filename-input-row {
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .filename-input {
      flex: 1;
      font-size: 13px;
      padding: 5px 10px;
      border: 1px solid var(--border-hover);
      border-radius: var(--radius-md);
      background: var(--bg-secondary);
      color: var(--text-primary);
      outline: none;
    }

    .filename-input:focus { border-color: var(--border-info); }

    .filename-ext {
      font-size: 13px;
      color: var(--text-secondary);
      flex-shrink: 0;
    }

    .filename-hint {
      font-size: 11px;
      color: var(--text-secondary);
      margin-top: 4px;
    }

    /* ── 배지 & 버튼 ── */
    .badge {
      font-size: 11px;
      padding: 3px 10px;
      border-radius: 999px;
      font-weight: 500;
      flex-shrink: 0;
    }

    .badge-processing { background: var(--bg-info); color: var(--text-info); }
    .badge-success { background: var(--bg-success); color: var(--text-success); }
    .badge-error { background: var(--bg-warning); color: #c0392b; }

    .icon-btn {
      display: flex;
      align-items: center;
      justify-content: center;
      width: 30px;
      height: 30px;
      border-radius: var(--radius-md);
      border: 0.5px solid var(--border-hover);
      background: transparent;
      color: var(--text-primary);
      font-size: 15px;
      cursor: pointer;
      transition: background 0.12s;
      flex-shrink: 0;
    }

    .icon-btn:hover { background: var(--bg-secondary); }
    .icon-btn:disabled { opacity: 0.3; cursor: default; }

    /* ── 하단 액션 버튼 ── */
    .bulk-actions {
      display: flex;
      gap: 10px;
      margin-top: 12px;
    }

    .action-btn {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
      padding: 10px;
      border-radius: var(--radius-md);
      border: 0.5px solid var(--border-hover);
      background: transparent;
      color: var(--text-primary);
      font-size: 14px;
      cursor: pointer;
      transition: background 0.12s;
    }

    .action-btn:hover:not(:disabled) { background: var(--bg-secondary); }
    .action-btn:disabled { opacity: 0.4; cursor: default; }
    .action-btn.primary {
      background: var(--text-primary);
      color: var(--bg);
      border-color: var(--text-primary);
      transition: background 0.15s, color 0.15s;
    }
    .action-btn.primary:hover:not(:disabled) {
      background: transparent;
      color: var(--text-primary);
    }

    footer {
      margin-top: 2.5rem;
      font-size: 12px;
      color: var(--text-secondary);
      text-align: center;
    }
  </style>
</head>

    </div>

    <footer>
      모든 처리는 브라우저에서 진행됩니다. 이미지가 서버로 전송되지 않아요.
      <div style="margin-top:6px; font-size:11px; opacity:0.7;">&copy; 계란토스트</div>
    </footer>
  </div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
  <script>
    const dropZone = document.getElementById('dropZone');
    const fileInput = document.getElementById('fileInput');
    const fileList = document.getElementById('fileList');
    const statsRow = document.getElementById('statsRow');
    const bulkActions = document.getElementById('bulkActions');
    const statCount = document.getElementById('statCount');

    // 전역 포맷 설정
    let globalFormat = 'original';
    document.querySelectorAll('.fmt-btn').forEach(btn => {
      btn.addEventListener('click', () => {
        document.querySelectorAll('.fmt-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        globalFormat = btn.dataset.fmt;
      });
    });

    let processedFiles = [];

    // 초기화
    document.getElementById('resetBtn').onclick = () => {
      processedFiles = [];
      fileList.innerHTML = '';
      statCount.textContent = '0';
      statsRow.style.display = 'none';
      bulkActions.style.display = 'none';
      fileInput.value = '';
    };

    dropZone.addEventListener('click', () => fileInput.click());
    dropZone.addEventListener('dragover', e => { e.preventDefault(); dropZone.classList.add('dragover'); });
    dropZone.addEventListener('dragleave', () => dropZone.classList.remove('dragover'));
    dropZone.addEventListener('drop', e => {
      e.preventDefault();
      dropZone.classList.remove('dragover');
      handleFiles([...e.dataTransfer.files]);
    });
    fileInput.addEventListener('change', e => {
      handleFiles([...e.target.files]);
      e.target.value = '';
    });

    function formatBytes(b) {
      if (b < 1024) return b + ' B';
      if (b < 1024 * 1024) return (b / 1024).toFixed(1) + ' KB';
      return (b / (1024 * 1024)).toFixed(2) + ' MB';
    }

    function getMimeAndExt(originalType) {
      if (globalFormat !== 'original') {
        const extMap = { 'image/png': 'png', 'image/jpeg': 'jpg', 'image/webp': 'webp' };
        return { mime: globalFormat, ext: extMap[globalFormat] };
      }
      // 원본 유지
      const map = {
        'image/png': { mime: 'image/png', ext: 'png' },
        'image/jpeg': { mime: 'image/jpeg', ext: 'jpg' },
        'image/webp': { mime: 'image/webp', ext: 'webp' },
        'image/gif': { mime: 'image/png', ext: 'png' }, // GIF → PNG (canvas 한계)
      };
      return map[originalType] || { mime: 'image/png', ext: 'png' };
    }

    function stripExt(filename) {
      return filename.replace(/\.[^.]+$/, '');
    }

    // FileReader 기반으로 이미지를 캔버스에 다시 그려 지정한 포맷의 Blob으로 변환합니다.
    // (모바일 호환성도 ↑)
    function convertToBlob(sourceBlob, targetFormat) {
      return new Promise((resolve, reject) => {
        const reader = new FileReader();
        reader.onload = () => {
          const img = new Image();
          img.onload = () => {
            try {
              const canvas = document.createElement('canvas');
              canvas.width = img.naturalWidth;
              canvas.height = img.naturalHeight;
              canvas.getContext('2d').drawImage(img, 0, 0);
              canvas.toBlob(b => {
                if (b) resolve({ blob: b, width: img.naturalWidth, height: img.naturalHeight });
                else reject(new Error('이미지 변환에 실패했습니다.'));
              }, `image/${targetFormat}`, 1.0);
            } catch (err) {
              reject(err);
            }
          };
          img.onerror = () => reject(new Error('이미지를 불러올 수 없습니다.'));
          img.src = reader.result;
        };
        reader.onerror = () => reject(new Error('파일을 읽을 수 없습니다.'));
        reader.readAsDataURL(sourceBlob);
      });
    }

    // NAI/SD 계열 PNG는 텍스트 청크뿐 아니라 알파 채널 LSB에 스테가노그래피 방식으로
    // 메타데이터를 숨기는 경우가 있어, 단순히 캔버스에 한 번 다시 그리는 것만으로는
    // 제거되지 않습니다. 항상 무손실 알파가 없는 JPEG로 1차 변환해 그 정보를 깨뜨린 뒤,
    // 필요하면 최종 포맷으로 2차 변환합니다.
    async function stripMetadataAndConvert(sourceFile, finalExt) {
      const canvasFmt = finalExt === 'jpg' ? 'jpeg' : finalExt; // png | jpeg | webp
      const relayed = await convertToBlob(sourceFile, 'jpeg');
      if (canvasFmt === 'jpeg') return relayed;
      return await convertToBlob(relayed.blob, canvasFmt);
    }

    function handleFiles(files) {
      const imgs = files.filter(f => f.type.startsWith('image/'));
      if (!imgs.length) return;
      statsRow.style.display = 'flex';
      imgs.forEach(processFile);
    }

    function processFile(file) {
      const idx = processedFiles.length;
      processedFiles.push(null);

      const baseName = stripExt(file.name);
      const { mime, ext } = getMimeAndExt(file.type);
      const defaultOutputName = `MetaRemoved_${baseName}`;

      // DOM 구성
      const item = document.createElement('div');
      item.className = 'file-item';
      item.innerHTML = `
        <div class="file-item-main">
          <img class="file-thumb" id="thumb-${idx}" src="" alt="">
          <div class="file-info">
            <div class="file-name-row">
              <div class="file-name" id="fname-${idx}">${file.name}</div>
            </div>
            <div class="file-meta" id="meta-${idx}">처리 중...</div>
          </div>
          <span class="badge badge-processing" id="badge-${idx}">처리 중</span>
          <button class="icon-btn" id="editBtn-${idx}" title="파일명 변경" disabled>
            <i class="ti ti-pencil"></i>
          </button>
          <button class="icon-btn" id="dl-${idx}" title="저장" disabled>
            <i class="ti ti-download"></i>
          </button>
        </div>
        <div class="filename-edit" id="editArea-${idx}">
          <div class="filename-input-row">
            <input class="filename-input" id="fnInput-${idx}" type="text" value="${defaultOutputName}" spellcheck="false">
            <span class="filename-ext" id="fnExt-${idx}">.${ext}</span>
          </div>
          <div class="filename-hint">파일명을 입력하세요. 확장자는 자동으로 추가됩니다.</div>
        </div>`;
      fileList.appendChild(item);

      const thumbEl = document.getElementById(`thumb-${idx}`);
      const metaEl = document.getElementById(`meta-${idx}`);
      const badgeEl = document.getElementById(`badge-${idx}`);
      const dlBtn = document.getElementById(`dl-${idx}`);
      const editBtn = document.getElementById(`editBtn-${idx}`);
      const editArea = document.getElementById(`editArea-${idx}`);
      const fnInput = document.getElementById(`fnInput-${idx}`);
      const fnExt = document.getElementById(`fnExt-${idx}`);

      // 썸네일
      const reader = new FileReader();
      reader.onload = e => { thumbEl.src = e.target.result; };
      reader.readAsDataURL(file);

      // 메타데이터 제거 + 포맷 변환 (JPEG 중계 방식)
      const { ext: extOut } = getMimeAndExt(file.type);

      stripMetadataAndConvert(file, extOut).then(({ blob, width, height }) => {
        processedFiles[idx] = {
          blob,
          get name() {
            const v = fnInput.value.trim() || defaultOutputName;
            return v + '.' + extOut;
          },
          ext: extOut
        };

        // 파일명 확장자 업데이트
        fnExt.textContent = `.${extOut}`;

        statCount.textContent = processedFiles.filter(Boolean).length;

        metaEl.textContent = `${formatBytes(file.size)} → ${formatBytes(blob.size)} · ${width}×${height} · ${extOut.toUpperCase()}`;
        badgeEl.className = 'badge badge-success';
        badgeEl.textContent = '완료';

        // 버튼 활성화
        dlBtn.disabled = false;
        editBtn.disabled = false;

        dlBtn.onclick = () => download(blob, processedFiles[idx].name);

        editBtn.onclick = () => {
          const isOpen = editArea.classList.toggle('open');
          editBtn.querySelector('i').className = isOpen ? 'ti ti-pencil-off' : 'ti ti-pencil';
          if (isOpen) fnInput.focus();
        };

        const doneCount = processedFiles.filter(Boolean).length;
        if (doneCount >= 1) bulkActions.style.display = 'flex';
      }).catch(err => {
        badgeEl.className = 'badge badge-error';
        badgeEl.textContent = '오류';
        metaEl.textContent = `처리 실패: ${err.message}`;
      });
    }

    function download(blob, name) {
      const a = document.createElement('a');
      const href = URL.createObjectURL(blob);
      a.href = href;
      a.download = name;
      document.body.appendChild(a);
      a.click();
      a.remove();
      setTimeout(() => URL.revokeObjectURL(href), 1500);
    }

    // 전체 개별 저장
    document.getElementById('dlAllIndividual').onclick = async () => {
      const btn = document.getElementById('dlAllIndividual');
      const ready = processedFiles.filter(Boolean);
      if (!ready.length) return;

      btn.disabled = true;
      const originalHTML = btn.innerHTML;

      // ── 방법 1: File System Access API (Chrome / Edge) ──
      // 폴더를 한 번 선택하면 차단 없이 전부 저장
      if ('showDirectoryPicker' in window) {
        try {
          const dirHandle = await window.showDirectoryPicker({ mode: 'readwrite' });
          for (let i = 0; i < ready.length; i++) {
            btn.innerHTML = `<i class="ti ti-files"></i> 저장 중... (${i + 1}/${ready.length})`;
            const fileHandle = await dirHandle.getFileHandle(ready[i].name, { create: true });
            const writable = await fileHandle.createWritable();
            await writable.write(ready[i].blob);
            await writable.close();
          }
          btn.disabled = false;
          btn.innerHTML = originalHTML;
          return;
        } catch (err) {
          if (err.name === 'AbortError') {
            // 사용자가 폴더 선택 취소
            btn.disabled = false;
            btn.innerHTML = originalHTML;
            return;
          }
          // 그 외 오류 → 순차 다운로드로 폴백
        }
      }

      // ── 방법 2: 순차 다운로드 (Firefox 등 폴백) ──
      // 파일 사이에 350ms 딜레이를 줘서 브라우저 차단 우회
      for (let i = 0; i < ready.length; i++) {
        btn.innerHTML = `<i class="ti ti-files"></i> 다운로드 중... (${i + 1}/${ready.length})`;
        download(ready[i].blob, ready[i].name);
        if (i < ready.length - 1) {
          await new Promise(resolve => setTimeout(resolve, 350));
        }
      }

      btn.disabled = false;
      btn.innerHTML = originalHTML;
    };

    // ZIP 저장
    document.getElementById('dlAllZip').onclick = async () => {
      const btn = document.getElementById('dlAllZip');
      const ready = processedFiles.filter(Boolean);
      if (!ready.length) return;
      btn.disabled = true;
      btn.innerHTML = '<i class="ti ti-loader"></i> ZIP 생성 중...';
      const zip = new JSZip();
      // 중복 파일명 방지
      const nameCount = {};
      ready.forEach(f => {
        const n = f.name;
        if (nameCount[n] === undefined) {
          nameCount[n] = 0;
          zip.file(n, f.blob);
        } else {
          nameCount[n]++;
          const ext = n.split('.').pop();
          const base = n.slice(0, -(ext.length + 1));
          zip.file(`${base} (${nameCount[n]}).${ext}`, f.blob);
        }
      });
      const content = await zip.generateAsync({ type: 'blob' });
      download(content, 'MetaRemoved_images.zip');
      btn.disabled = false;
      btn.innerHTML = '<i class="ti ti-file-zip"></i> ZIP으로 저장';
    };
  </script>
</body>
</html>
